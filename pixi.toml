[workspace]
name = "ling539-class-competition"
version = "0.1.0"
description = "LING 539 Kaggle class competition pipeline"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
download-data = "mkdir -p data/raw && kaggle competitions download -c ling-539-competition-2026 -p data/raw && unzip -o data/raw/ling-539-competition-2026.zip -d data/raw"
train-classic = "PYTHONPATH=src python -m ling539_competition.train_classic"
train-hybrid-advanced = "PYTHONPATH=src python -m ling539_competition.train_hybrid_advanced"
train-hybrid-advanced-smoke = "PYTHONPATH=src python -m ling539_competition.train_hybrid_advanced --sample-size 3000 --max-steps 150 --epochs 1 --max-train-minutes 10"
submit = "kaggle competitions submit -c ling-539-competition-2026 -f submissions/advanced_submission.csv -m 'advanced DistilBERT TF-IDF LinearSVC blend'"
test = "PYTHONPATH=src pytest -q"
launch-notebook = "bash scripts/launch-notebook"

[dependencies]
python = "3.11.*"
pip = "*"
ipython = ">=9,<10"
notebook = ">=7,<8"
jupyter_client = ">=8,<9"

numpy = ">=2,<3"
pandas = ">=2.2,<3"
scipy = ">=1.13,<2"
scikit-learn = ">=1.5,<2"
matplotlib = ">=3.8,<4"
seaborn = ">=0.13,<0.14"
joblib = ">=1.4,<2"

kaggle = ">=1.8,<2"
pytest = ">=8,<9"

[pypi-dependencies]
transformers = ">=4.40,<5"
torch = ">=2.2,<3"

[feature.dev.dependencies]
black = ">=24,<26"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
